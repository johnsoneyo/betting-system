#      - name: Build & Push Processor Docker Image
#        uses: docker/build-push-action@v4
#        with:
#          context: messaging/event-outcomes-processor
#          push: true
#          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/event-outcomes-processor:latest
#          cache: type=gha

  event-bet-settlement:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && (
      inputs.service == 'all' || inputs.service == 'event-bet-settlement'
      ))
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build & Test Settlement
        run: ./mvnw -f messaging/event-bet-settlement/pom.xml clean verify

