name: Multi-module CI/CD

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      service:
        description: 'Select service to build'
        required: true
        type: choice
        default: all
        options:
          - all
          - event-outcomes-api
          - event-outcomes-processor
          - event-bet-settlement

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}

jobs:

  event-outcomes-api:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && (
      inputs.service == 'all' || inputs.service == 'event-outcomes-api'
      ))
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build & Test API
        run: ./mvnw -f api/event-outcomes-api/pom.xml clean verify

      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push API Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: docker/Dockerfile-event-outcomes-api
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/event-outcomes-api:latest
          cache: type=gha

  event-outcomes-processor:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && (
      inputs.service == 'all' || inputs.service == 'event-outcomes-processor'
      ))
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build & Test Processor
        run: ./mvnw -f messaging/event-outcomes-processor/pom.xml clean verify

#      - name: Login to GHCR
#        uses: docker/login-action@v2
#        with:
#          registry: ${{ env.REGISTRY }}
