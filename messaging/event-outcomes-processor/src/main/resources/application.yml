server:
   port: 8081 # Need to view h2 console at localhost:8081/h2-console
spring:
  datasource:
    url: jdbc:h2:mem:betting_db
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update   # creates/updates tables from entities
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true

  sql:
    init:
      mode: always
      data-locations: classpath:db/seed.sql

common:
  kafka:
    consumer:
      enabled: true
    bootstrap-servers: localhost:9094, localhost:9095  # Kafka broker address

rocketmq:
  name-server: localhost:9876
  producer:
    group: bet-settlement-producer-group
